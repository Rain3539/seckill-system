spring:
  application:
    name: order-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: SECKILL_GROUP
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yml
        group: SECKILL_GROUP
        shared-configs:
          - data-id: seckill-common.yml
            group: SECKILL_GROUP
            refresh: true
