<svg width="100%" viewBox="0 0 760 820" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>商品与秒杀系统整体架构（微服务拆分版）</title>
  <desc>五层架构：客户端 → Nginx接入层 → 微服务集群（stock-service + order-service）→ 中间件层（Redis + Kafka）→ 数据层（两组MySQL主从）。服务间通过HTTP进行TCC分布式事务协调。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════
       ROW 0 — Client
  ══════════════════════════════════════ -->
  <g>
    <rect x="280" y="16" width="200" height="44" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
    <text x="380" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(68,68,65)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Client 浏览器</text>
  </g>

  <!-- Client ↓ Nginx -->
  <line x1="380" y1="60" x2="380" y2="94" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════
       ROW 1 — 接入层
  ══════════════════════════════════════ -->
  <rect x="44" y="96" width="672" height="80" rx="12" fill="rgb(245,244,237)" stroke="rgb(29,158,117)" stroke-width="0.5" stroke-dasharray="5 3" opacity="0.7"/>
  <text x="56" y="112" opacity="0.55" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">接入层</text>

  <!-- Nginx -->
  <rect x="140" y="116" width="200" height="50" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="240" y="136" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Nginx :80</text>
  <text x="240" y="154" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="11" font-family="system-ui, sans-serif">反向代理 / 负载均衡 / 动静分离</text>

  <!-- Static -->
  <rect x="380" y="116" width="200" height="50" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="480" y="136" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Vue 3 SPA</text>
  <text x="480" y="154" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="11" font-family="system-ui, sans-serif">静态资源 · JS / CSS / 图片</text>

  <!-- Nginx routing labels -->
  <text x="240" y="190" text-anchor="middle" fill="rgb(136,135,128)" font-size="10" font-family="system-ui, sans-serif">/api/seckill|product|stock → stock_cluster</text>
  <text x="240" y="203" text-anchor="middle" fill="rgb(136,135,128)" font-size="10" font-family="system-ui, sans-serif">/api/order|user → order_cluster</text>

  <!-- Nginx ↓ 微服务 -->
  <line x1="200" y1="176" x2="200" y2="228" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="380" y1="176" x2="560" y2="228" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════
       ROW 2 — 微服务集群
  ══════════════════════════════════════ -->
  <rect x="44" y="216" width="672" height="150" rx="12" fill="rgb(245,244,237)" stroke="rgb(55,138,221)" stroke-width="0.5" stroke-dasharray="5 3" opacity="0.7"/>
  <text x="56" y="232" opacity="0.55" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">微服务集群</text>

  <!-- stock-service 框 -->
  <rect x="60" y="242" width="280" height="112" rx="10" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.8"/>
  <text x="200" y="260" text-anchor="middle" fill="rgb(12,68,124)" font-size="13" font-weight="600" font-family="system-ui, sans-serif">stock-service</text>

  <!-- stock-service 实例 -->
  <rect x="72" y="270" width="124" height="40" rx="6" fill="rgb(240,247,255)" stroke="rgb(24,95,165)" stroke-width="0.4"/>
  <text x="134" y="286" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Instance-1 :8081</text>
  <text x="134" y="300" text-anchor="middle" dominant-baseline="central" fill="rgb(100,130,170)" font-size="10" font-family="system-ui, sans-serif">Spring Boot 3.2</text>

  <rect x="208" y="270" width="124" height="40" rx="6" fill="rgb(240,247,255)" stroke="rgb(24,95,165)" stroke-width="0.4"/>
  <text x="270" y="286" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Instance-2 :8083</text>
  <text x="270" y="300" text-anchor="middle" dominant-baseline="central" fill="rgb(100,130,170)" font-size="10" font-family="system-ui, sans-serif">Spring Boot 3.2</text>

  <!-- stock-service 职责 -->
  <text x="200" y="326" text-anchor="middle" fill="rgb(83,74,183)" font-size="10" font-family="system-ui, sans-serif">商品/库存/秒杀入口 · Kafka Producer + Consumer</text>
  <text x="200" y="340" text-anchor="middle" fill="rgb(83,74,183)" font-size="10" font-family="system-ui, sans-serif">Redis 预扣库存 · TCC Stock Participant</text>

  <!-- order-service 框 -->
  <rect x="380" y="242" width="320" height="112" rx="10" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.8"/>
  <text x="540" y="260" text-anchor="middle" fill="rgb(12,68,124)" font-size="13" font-weight="600" font-family="system-ui, sans-serif">order-service</text>

  <!-- order-service 实例 -->
  <rect x="392" y="270" width="148" height="40" rx="6" fill="rgb(240,247,255)" stroke="rgb(24,95,165)" stroke-width="0.4"/>
  <text x="466" y="286" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Instance-1 :8082</text>
  <text x="466" y="300" text-anchor="middle" dominant-baseline="central" fill="rgb(100,130,170)" font-size="10" font-family="system-ui, sans-serif">Spring Boot 3.2</text>

  <rect x="548" y="270" width="148" height="40" rx="6" fill="rgb(240,247,255)" stroke="rgb(24,95,165)" stroke-width="0.4"/>
  <text x="622" y="286" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Instance-2 :8084</text>
  <text x="622" y="300" text-anchor="middle" dominant-baseline="central" fill="rgb(100,130,170)" font-size="10" font-family="system-ui, sans-serif">Spring Boot 3.2</text>

  <!-- order-service 职责 -->
  <text x="540" y="326" text-anchor="middle" fill="rgb(83,74,183)" font-size="10" font-family="system-ui, sans-serif">用户认证(JWT) · 订单生命周期 · TCC Coordinator</text>
  <text x="540" y="340" text-anchor="middle" fill="rgb(83,74,183)" font-size="10" font-family="system-ui, sans-serif">超时取消任务(30s) · 支付/取消 TCC Confirm/Cancel</text>

  <!-- 服务间 HTTP 调用（TCC） -->
  <path d="M340 295 L380 295" fill="none" stroke="rgb(186,117,23)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <path d="M380 310 L340 310" fill="none" stroke="rgb(186,117,23)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="360" y="288" text-anchor="middle" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif">HTTP TCC</text>
  <text x="360" y="322" text-anchor="middle" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif">Try/Confirm/Cancel</text>

  <!-- ══════════════════════════════════════
       ROW 3 — 中间件层
  ══════════════════════════════════════ -->
  <rect x="44" y="390" width="672" height="120" rx="12" fill="rgb(245,244,237)" stroke="rgb(127,119,221)" stroke-width="0.5" stroke-dasharray="5 3" opacity="0.6"/>
  <text x="56" y="406" opacity="0.55" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">中间件层</text>

  <!-- Redis -->
  <rect x="72" y="416" width="260" height="80" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="202" y="438" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Redis 7 :6379</text>
  <text x="202" y="458" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="11" font-family="system-ui, sans-serif">库存预扣(DECR) · 防重复(SETNX)</text>
  <text x="202" y="474" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="11" font-family="system-ui, sans-serif">分布式锁 · 商品缓存 · TCC回滚(INCRBY)</text>

  <!-- Kafka -->
  <rect x="388" y="416" width="300" height="80" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="538" y="438" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Kafka 3.x (KRaft) :9092</text>
  <text x="538" y="458" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-size="11" font-family="system-ui, sans-serif">topic: seckill-order (3 分区)</text>
  <text x="538" y="474" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-size="11" font-family="system-ui, sans-serif">Producer(acks=all) + Consumer(手动ACK)</text>

  <!-- 微服务 → 中间件箭头 -->
  <!-- stock-service → Redis -->
  <line x1="140" y1="354" x2="140" y2="416" stroke="rgb(83,74,183)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- stock-service → Kafka -->
  <line x1="260" y1="354" x2="500" y2="416" stroke="rgb(186,117,23)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- order-service → Redis -->
  <line x1="540" y1="354" x2="300" y2="416" stroke="rgb(83,74,183)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════
       ROW 4 — 数据层
  ══════════════════════════════════════ -->
  <rect x="44" y="534" width="672" height="210" rx="12" fill="rgb(245,244,237)" stroke="rgb(216,90,48)" stroke-width="0.5" stroke-dasharray="5 3" opacity="0.6"/>
  <text x="56" y="550" opacity="0.55" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">数据层</text>

  <!-- ── stock_db 集群 ── -->
  <text x="202" y="568" text-anchor="middle" fill="rgb(153,60,29)" font-size="11" font-weight="600" font-family="system-ui, sans-serif">stock_db 集群</text>

  <!-- stock MySQL Master -->
  <ellipse cx="136" cy="590" rx="60" ry="12" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <rect x="76" y="590" width="120" height="48" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <ellipse cx="136" cy="638" rx="60" ry="12" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="136" y="610" text-anchor="middle" dominant-baseline="central" fill="rgb(20,20,19)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Master :3308</text>
  <text x="136" y="628" text-anchor="middle" dominant-baseline="central" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">读写 · binlog ROW</text>

  <!-- stock MySQL Slave -->
  <ellipse cx="268" cy="590" rx="60" ry="12" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <rect x="208" y="590" width="120" height="48" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <ellipse cx="268" cy="638" rx="60" ry="12" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="268" y="610" text-anchor="middle" dominant-baseline="central" fill="rgb(20,20,19)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Slave :3309</text>
  <text x="268" y="628" text-anchor="middle" dominant-baseline="central" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">只读 · relay-log</text>

  <!-- stock binlog sync -->
  <line x1="196" y1="614" x2="208" y2="614" stroke="rgb(186,117,23)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="202" y="608" text-anchor="middle" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif">binlog</text>

  <!-- stock_db 表 -->
  <text x="202" y="664" text-anchor="middle" fill="rgb(100,130,170)" font-size="10" font-family="system-ui, sans-serif">product · seckill_product</text>

  <!-- ── order_db 集群 ── -->
  <text x="558" y="568" text-anchor="middle" fill="rgb(153,60,29)" font-size="11" font-weight="600" font-family="system-ui, sans-serif">order_db 集群</text>

  <!-- order MySQL Master -->
  <ellipse cx="492" cy="590" rx="60" ry="12" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <rect x="432" y="590" width="120" height="48" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <ellipse cx="492" cy="638" rx="60" ry="12" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="492" y="610" text-anchor="middle" dominant-baseline="central" fill="rgb(20,20,19)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Master :3310</text>
  <text x="492" y="628" text-anchor="middle" dominant-baseline="central" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">读写 · binlog ROW</text>

  <!-- order MySQL Slave -->
  <ellipse cx="624" cy="590" rx="60" ry="12" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <rect x="564" y="590" width="120" height="48" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <ellipse cx="624" cy="638" rx="60" ry="12" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="624" y="610" text-anchor="middle" dominant-baseline="central" fill="rgb(20,20,19)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Slave :3311</text>
  <text x="624" y="628" text-anchor="middle" dominant-baseline="central" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">只读 · relay-log</text>

  <!-- order binlog sync -->
  <line x1="552" y1="614" x2="564" y2="614" stroke="rgb(186,117,23)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="558" y="608" text-anchor="middle" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif">binlog</text>

  <!-- order_db 表 -->
  <text x="558" y="664" text-anchor="middle" fill="rgb(100,130,170)" font-size="10" font-family="system-ui, sans-serif">user · order</text>

  <!-- ── 读写分离标注 ── -->
  <rect x="60" y="680" width="640" height="48" rx="6" fill="rgb(248,248,245)" stroke="rgba(31,30,29,0.15)" stroke-width="0.5"/>
  <text x="380" y="698" text-anchor="middle" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">读写分离：AOP 拦截 → get/find/list/query/count/select 方法路由 Slave，其余路由 Master（DynamicDataSource + ThreadLocal）</text>
  <text x="380" y="714" text-anchor="middle" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">两组独立数据库集群，服务间不共享数据库，通过 HTTP REST API 进行跨服务数据访问</text>

  <!-- 微服务 → 数据层箭头 -->
  <!-- stock-service → stock Master (写) -->
  <line x1="160" y1="354" x2="136" y2="578" stroke="rgb(216,90,48)" stroke-width="0.9" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- stock-service → stock Slave (读) -->
  <line x1="240" y1="354" x2="268" y2="578" stroke="rgb(136,135,128)" stroke-width="0.9" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- order-service → order Master (写) -->
  <line x1="500" y1="354" x2="492" y2="578" stroke="rgb(216,90,48)" stroke-width="0.9" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- order-service → order Slave (读) -->
  <line x1="580" y1="354" x2="624" y2="578" stroke="rgb(136,135,128)" stroke-width="0.9" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Kafka → stock-service (消费写入) -->
  <line x1="500" y1="496" x2="260" y2="354" stroke="rgb(186,117,23)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════
       图例
  ══════════════════════════════════════ -->
  <rect x="60" y="740" width="640" height="64" rx="8" fill="rgb(245,244,237)" stroke="rgba(31,30,29,0.2)" stroke-width="0.5"/>
  <text x="80" y="758" fill="rgb(61,61,58)" font-size="11" font-weight="500" font-family="system-ui, sans-serif">图例</text>

  <line x1="80" y1="772" x2="110" y2="772" stroke="rgba(31,30,29,0.3)" stroke-width="1"/>
  <text x="116" y="776" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">同步调用</text>

  <line x1="170" y1="772" x2="200" y2="772" stroke="rgb(186,117,23)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="206" y="776" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">TCC事务 / 消息</text>

  <line x1="290" y1="772" x2="320" y2="772" stroke="rgb(216,90,48)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="326" y="776" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">DB写入</text>

  <line x1="390" y1="772" x2="420" y2="772" stroke="rgb(136,135,128)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="426" y="776" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">DB读取</text>

  <line x1="480" y1="772" x2="510" y2="772" stroke="rgb(186,117,23)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="516" y="776" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">binlog同步</text>

  <!-- 底部说明 -->
  <text x="380" y="796" text-anchor="middle" fill="rgb(136,135,128)" font-size="10" font-family="system-ui, sans-serif">微服务架构：stock-service（库存域）与 order-service（订单域）独立部署、独立数据库，通过 HTTP REST + TCC 保证分布式事务一致性</text>
</svg>
