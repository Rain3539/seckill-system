<svg width="100%" viewBox="0 0 820 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>数据库 ER 图（微服务拆分版）</title>
  <desc>两组独立数据库集群：stock_db（product, seckill_product）和 order_db（user, order）。服务间不共享数据库。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="crowfoot" viewBox="0 0 16 12" refX="0" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M0 6L12 0M0 6L12 12M6 6L12 6" fill="none" stroke="context-stroke" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════
       stock_db 集群
  ══════════════════════════════════════ -->
  <rect x="20" y="16" width="380" height="560" rx="12" fill="rgb(245,248,255)" stroke="rgb(55,138,221)" stroke-width="0.8" stroke-dasharray="6 3" opacity="0.5"/>
  <text x="210" y="40" text-anchor="middle" fill="rgb(55,138,221)" font-size="14" font-weight="600" font-family="system-ui, sans-serif">stock_db</text>
  <text x="210" y="56" text-anchor="middle" fill="rgb(120,140,170)" font-size="10" font-family="system-ui, sans-serif">MySQL Master :3308 ←binlog→ Slave :3309</text>

  <!-- ── product 表 ── -->
  <rect x="36" y="72" width="348" height="230" rx="8" fill="white" stroke="rgb(200,210,230)" stroke-width="0.8"/>
  <rect x="36" y="72" width="348" height="34" rx="8" fill="rgb(230,241,251)" stroke="rgb(200,210,230)" stroke-width="0.8"/>
  <rect x="36" y="98" width="348" height="8" fill="rgb(230,241,251)"/>
  <text x="210" y="94" text-anchor="middle" fill="rgb(12,68,124)" font-size="13" font-weight="600" font-family="system-ui, sans-serif">product（普通商品表）</text>

  <text x="48" y="126" fill="rgb(61,61,58)" font-size="11" font-family="monospace">id</text>
  <text x="140" y="126" fill="rgb(120,140,170)" font-size="10" font-family="monospace">BIGINT PK AUTO_INCREMENT</text>

  <text x="48" y="146" fill="rgb(61,61,58)" font-size="11" font-family="monospace">name</text>
  <text x="140" y="146" fill="rgb(120,140,170)" font-size="10" font-family="monospace">VARCHAR(200) NOT NULL</text>

  <text x="48" y="166" fill="rgb(61,61,58)" font-size="11" font-family="monospace">description</text>
  <text x="140" y="166" fill="rgb(120,140,170)" font-size="10" font-family="monospace">TEXT</text>

  <text x="48" y="186" fill="rgb(61,61,58)" font-size="11" font-family="monospace">price</text>
  <text x="140" y="186" fill="rgb(120,140,170)" font-size="10" font-family="monospace">DECIMAL(10,2) NOT NULL</text>

  <text x="48" y="206" fill="rgb(61,61,58)" font-size="11" font-family="monospace">stock</text>
  <text x="140" y="206" fill="rgb(120,140,170)" font-size="10" font-family="monospace">INT NOT NULL DEFAULT 0</text>

  <text x="48" y="226" fill="rgb(61,61,58)" font-size="11" font-family="monospace">image_url</text>
  <text x="140" y="226" fill="rgb(120,140,170)" font-size="10" font-family="monospace">VARCHAR(500)</text>

  <text x="48" y="246" fill="rgb(61,61,58)" font-size="11" font-family="monospace">status</text>
  <text x="140" y="246" fill="rgb(120,140,170)" font-size="10" font-family="monospace">TINYINT NOT NULL DEFAULT 1</text>

  <text x="48" y="266" fill="rgb(61,61,58)" font-size="11" font-family="monospace">created_at</text>
  <text x="140" y="266" fill="rgb(120,140,170)" font-size="10" font-family="monospace">DATETIME DEFAULT NOW()</text>

  <text x="48" y="286" fill="rgb(61,61,58)" font-size="11" font-family="monospace">updated_at</text>
  <text x="140" y="286" fill="rgb(120,140,170)" font-size="10" font-family="monospace">DATETIME ON UPDATE NOW()</text>

  <!-- ── seckill_product 表 ── -->
  <rect x="36" y="320" width="348" height="248" rx="8" fill="white" stroke="rgb(200,210,230)" stroke-width="0.8"/>
  <rect x="36" y="320" width="348" height="34" rx="8" fill="rgb(250,238,218)" stroke="rgb(200,210,230)" stroke-width="0.8"/>
  <rect x="36" y="346" width="348" height="8" fill="rgb(250,238,218)"/>
  <text x="210" y="342" text-anchor="middle" fill="rgb(99,56,6)" font-size="13" font-weight="600" font-family="system-ui, sans-serif">seckill_product（秒杀商品表）</text>

  <text x="48" y="374" fill="rgb(61,61,58)" font-size="11" font-family="monospace">id</text>
  <text x="152" y="374" fill="rgb(120,140,170)" font-size="10" font-family="monospace">BIGINT PK AUTO_INCREMENT</text>

  <text x="48" y="394" fill="rgb(61,61,58)" font-size="11" font-family="monospace">name</text>
  <text x="152" y="394" fill="rgb(120,140,170)" font-size="10" font-family="monospace">VARCHAR(200) NOT NULL</text>

  <text x="48" y="414" fill="rgb(61,61,58)" font-size="11" font-family="monospace">description</text>
  <text x="152" y="414" fill="rgb(120,140,170)" font-size="10" font-family="monospace">TEXT</text>

  <text x="48" y="434" fill="rgb(61,61,58)" font-size="11" font-family="monospace">origin_price</text>
  <text x="152" y="434" fill="rgb(120,140,170)" font-size="10" font-family="monospace">DECIMAL(10,2) NOT NULL</text>

  <text x="48" y="454" fill="rgb(61,61,58)" font-size="11" font-family="monospace">seckill_price</text>
  <text x="152" y="454" fill="rgb(120,140,170)" font-size="10" font-family="monospace">DECIMAL(10,2) NOT NULL</text>

  <text x="48" y="474" fill="rgb(216,90,48)" font-size="11" font-weight="500" font-family="monospace">total_stock</text>
  <text x="152" y="474" fill="rgb(120,140,170)" font-size="10" font-family="monospace">INT NOT NULL DEFAULT 0</text>

  <text x="48" y="494" fill="rgb(216,90,48)" font-size="11" font-weight="500" font-family="monospace">avail_stock</text>
  <text x="152" y="494" fill="rgb(120,140,170)" font-size="10" font-family="monospace">INT NOT NULL DEFAULT 0  ← 可用库存</text>

  <text x="48" y="514" fill="rgb(216,90,48)" font-size="11" font-weight="500" font-family="monospace">locked_stock</text>
  <text x="152" y="514" fill="rgb(120,140,170)" font-size="10" font-family="monospace">INT NOT NULL DEFAULT 0  ← TCC锁定</text>

  <text x="48" y="534" fill="rgb(133,79,11)" font-size="11" font-weight="500" font-family="monospace">version</text>
  <text x="152" y="534" fill="rgb(120,140,170)" font-size="10" font-family="monospace">INT NOT NULL DEFAULT 0  ← 乐观锁</text>

  <text x="48" y="554" fill="rgb(61,61,58)" font-size="11" font-family="monospace">image_url</text>
  <text x="152" y="554" fill="rgb(120,140,170)" font-size="10" font-family="monospace">VARCHAR(500)</text>

  <text x="48" y="574" fill="rgb(61,61,58)" font-size="11" font-family="monospace">start_time / end_time</text>
  <text x="196" y="574" fill="rgb(120,140,170)" font-size="10" font-family="monospace">DATETIME NOT NULL</text>

  <text x="48" y="594" fill="rgb(61,61,58)" font-size="11" font-family="monospace">status</text>
  <text x="152" y="594" fill="rgb(120,140,170)" font-size="10" font-family="monospace">TINYINT NOT NULL DEFAULT 1</text>

  <!-- ══════════════════════════════════════
       order_db 集群
  ══════════════════════════════════════ -->
  <rect x="420" y="16" width="380" height="560" rx="12" fill="rgb(255,248,240)" stroke="rgb(216,90,48)" stroke-width="0.8" stroke-dasharray="6 3" opacity="0.5"/>
  <text x="610" y="40" text-anchor="middle" fill="rgb(216,90,48)" font-size="14" font-weight="600" font-family="system-ui, sans-serif">order_db</text>
  <text x="610" y="56" text-anchor="middle" fill="rgb(170,130,110)" font-size="10" font-family="system-ui, sans-serif">MySQL Master :3310 ←binlog→ Slave :3311</text>

  <!-- ── user 表 ── -->
  <rect x="436" y="72" width="348" height="212" rx="8" fill="white" stroke="rgb(230,200,180)" stroke-width="0.8"/>
  <rect x="436" y="72" width="348" height="34" rx="8" fill="rgb(238,237,254)" stroke="rgb(230,200,180)" stroke-width="0.8"/>
  <rect x="436" y="98" width="348" height="8" fill="rgb(238,237,254)"/>
  <text x="610" y="94" text-anchor="middle" fill="rgb(60,52,137)" font-size="13" font-weight="600" font-family="system-ui, sans-serif">user（用户表）</text>

  <text x="448" y="126" fill="rgb(61,61,58)" font-size="11" font-family="monospace">id</text>
  <text x="540" y="126" fill="rgb(120,140,170)" font-size="10" font-family="monospace">BIGINT PK AUTO_INCREMENT</text>

  <text x="448" y="146" fill="rgb(61,61,58)" font-size="11" font-family="monospace">username</text>
  <text x="540" y="146" fill="rgb(120,140,170)" font-size="10" font-family="monospace">VARCHAR(50) NOT NULL UNIQUE</text>

  <text x="448" y="166" fill="rgb(61,61,58)" font-size="11" font-family="monospace">password</text>
  <text x="540" y="166" fill="rgb(120,140,170)" font-size="10" font-family="monospace">VARCHAR(255) NOT NULL [BCrypt]</text>

  <text x="448" y="186" fill="rgb(61,61,58)" font-size="11" font-family="monospace">email</text>
  <text x="540" y="186" fill="rgb(120,140,170)" font-size="10" font-family="monospace">VARCHAR(100)</text>

  <text x="448" y="206" fill="rgb(61,61,58)" font-size="11" font-family="monospace">phone</text>
  <text x="540" y="206" fill="rgb(120,140,170)" font-size="10" font-family="monospace">VARCHAR(20)</text>

  <text x="448" y="226" fill="rgb(61,61,58)" font-size="11" font-family="monospace">status</text>
  <text x="540" y="226" fill="rgb(120,140,170)" font-size="10" font-family="monospace">TINYINT NOT NULL DEFAULT 1</text>

  <text x="448" y="246" fill="rgb(61,61,58)" font-size="11" font-family="monospace">created_at</text>
  <text x="540" y="246" fill="rgb(120,140,170)" font-size="10" font-family="monospace">DATETIME DEFAULT NOW()</text>

  <text x="448" y="266" fill="rgb(61,61,58)" font-size="11" font-family="monospace">updated_at</text>
  <text x="540" y="266" fill="rgb(120,140,170)" font-size="10" font-family="monospace">DATETIME ON UPDATE NOW()</text>

  <!-- ── order 表 ── -->
  <rect x="436" y="302" width="348" height="266" rx="8" fill="white" stroke="rgb(230,200,180)" stroke-width="0.8"/>
  <rect x="436" y="302" width="348" height="34" rx="8" fill="rgb(250,238,218)" stroke="rgb(230,200,180)" stroke-width="0.8"/>
  <rect x="436" y="328" width="348" height="8" fill="rgb(250,238,218)"/>
  <text x="610" y="324" text-anchor="middle" fill="rgb(99,56,6)" font-size="13" font-weight="600" font-family="system-ui, sans-serif">order（订单表）</text>

  <text x="448" y="356" fill="rgb(61,61,58)" font-size="11" font-family="monospace">id</text>
  <text x="552" y="356" fill="rgb(120,140,170)" font-size="10" font-family="monospace">BIGINT PK AUTO_INCREMENT</text>

  <text x="448" y="376" fill="rgb(61,61,58)" font-size="11" font-family="monospace">order_no</text>
  <text x="552" y="376" fill="rgb(120,140,170)" font-size="10" font-family="monospace">VARCHAR(64) NOT NULL UNIQUE</text>

  <text x="448" y="396" fill="rgb(83,74,183)" font-size="11" font-weight="500" font-family="monospace">user_id</text>
  <text x="552" y="396" fill="rgb(120,140,170)" font-size="10" font-family="monospace">BIGINT NOT NULL [FK → user.id]</text>

  <text x="448" y="416" fill="rgb(83,74,183)" font-size="11" font-weight="500" font-family="monospace">product_id</text>
  <text x="552" y="416" fill="rgb(120,140,170)" font-size="10" font-family="monospace">BIGINT NOT NULL [逻辑外键]</text>

  <text x="448" y="436" fill="rgb(61,61,58)" font-size="11" font-family="monospace">product_type</text>
  <text x="552" y="436" fill="rgb(120,140,170)" font-size="10" font-family="monospace">TINYINT 0普通 / 1秒杀</text>

  <text x="448" y="456" fill="rgb(61,61,58)" font-size="11" font-family="monospace">product_name</text>
  <text x="552" y="456" fill="rgb(120,140,170)" font-size="10" font-family="monospace">VARCHAR(200) NOT NULL</text>

  <text x="448" y="476" fill="rgb(61,61,58)" font-size="11" font-family="monospace">quantity</text>
  <text x="552" y="476" fill="rgb(120,140,170)" font-size="10" font-family="monospace">INT NOT NULL DEFAULT 1</text>

  <text x="448" y="496" fill="rgb(61,61,58)" font-size="11" font-family="monospace">unit_price</text>
  <text x="552" y="496" fill="rgb(120,140,170)" font-size="10" font-family="monospace">DECIMAL(10,2) NOT NULL</text>

  <text x="448" y="516" fill="rgb(61,61,58)" font-size="11" font-family="monospace">amount</text>
  <text x="552" y="516" fill="rgb(120,140,170)" font-size="10" font-family="monospace">DECIMAL(10,2) NOT NULL</text>

  <text x="448" y="536" fill="rgb(216,90,48)" font-size="11" font-weight="500" font-family="monospace">status</text>
  <text x="552" y="536" fill="rgb(120,140,170)" font-size="10" font-family="monospace">TINYINT -1TCC预留 0待付 1已付 2取消</text>

  <text x="448" y="556" fill="rgb(133,79,11)" font-size="11" font-weight="500" font-family="monospace">timeout_at</text>
  <text x="552" y="556" fill="rgb(120,140,170)" font-size="10" font-family="monospace">DATETIME  ← TCC超时自动取消</text>

  <text x="448" y="576" fill="rgb(61,61,58)" font-size="11" font-family="monospace">created_at</text>
  <text x="552" y="576" fill="rgb(120,140,170)" font-size="10" font-family="monospace">DATETIME DEFAULT NOW()</text>

  <!-- ── user → order 关系线 ── -->
  <line x1="610" y1="284" x2="610" y2="302" stroke="rgb(83,74,183)" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="624" y="296" fill="rgb(83,74,183)" font-size="9" font-family="system-ui, sans-serif">1:N</text>

  <!-- ── seckill_product → order 逻辑关联（跨库）── -->
  <path d="M384 440 Q400 440 420 420 Q436 404 436 390" fill="none" stroke="rgb(186,117,23)" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="400" y="452" fill="rgb(186,117,23)" font-size="9" font-family="system-ui, sans-serif">逻辑关联</text>
  <text x="400" y="464" fill="rgb(186,117,23)" font-size="9" font-family="system-ui, sans-serif">(跨库, 无物理FK)</text>

  <!-- ── 底部说明 ── -->
  <rect x="20" y="588" width="780" height="24" rx="4" fill="rgb(248,248,245)" stroke="rgba(31,30,29,0.1)" stroke-width="0.5"/>
  <text x="410" y="604" text-anchor="middle" fill="rgb(100,100,95)" font-size="10" font-family="system-ui, sans-serif">两组独立数据库，服务间通过 HTTP REST API 访问跨库数据（order.product_id 为逻辑外键，不建物理外键约束）</text>
</svg>
