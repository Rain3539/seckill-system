<svg width="100%" viewBox="0 0 800 750" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>秒杀下单时序图（微服务版）</title>
  <desc>用户通过 Nginx 调用 stock-service 的秒杀接口，stock-service 通过 Redis 预扣库存、Kafka 异步消费、HTTP 调用 order-service 创建 TRYING 状态订单。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="return-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ═══════════ 参与者头部 ═══════════ -->
  <rect x="60" y="20" width="80" height="36" rx="6" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="100" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(68,68,65)" font-size="11" font-weight="500" font-family="system-ui, sans-serif">用户</text>

  <rect x="200" y="20" width="80" height="36" rx="6" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="240" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="11" font-weight="500" font-family="system-ui, sans-serif">Nginx</text>

  <rect x="340" y="20" width="100" height="36" rx="6" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="390" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="11" font-weight="500" font-family="system-ui, sans-serif">stock-service</text>

  <rect x="520" y="20" width="60" height="36" rx="6" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="550" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="11" font-weight="500" font-family="system-ui, sans-serif">Redis</text>

  <rect x="640" y="20" width="60" height="36" rx="6" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="670" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="11" font-weight="500" font-family="system-ui, sans-serif">Kafka</text>

  <rect x="730" y="20" width="60" height="36" rx="6" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="760" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="10" font-weight="500" font-family="system-ui, sans-serif">order-svc</text>

  <!-- ═══════════ 生命线 ═══════════ -->
  <line x1="100" y1="56" x2="100" y2="720" stroke="rgba(31,30,29,0.15)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="240" y1="56" x2="240" y2="720" stroke="rgba(31,30,29,0.15)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="390" y1="56" x2="390" y2="720" stroke="rgba(31,30,29,0.15)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="550" y1="56" x2="550" y2="720" stroke="rgba(31,30,29,0.15)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="670" y1="56" x2="670" y2="720" stroke="rgba(31,30,29,0.15)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="760" y1="56" x2="760" y2="720" stroke="rgba(31,30,29,0.15)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ═══════════ ① POST /api/seckill/do ═══════════ -->
  <line x1="100" y1="80" x2="390" y2="80" stroke="rgb(15,110,86)" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="245" y="74" text-anchor="middle" fill="rgb(15,110,86)" font-size="11" font-family="system-ui, sans-serif">POST /api/seckill/do</text>

  <!-- ═══════════ ② Redis DECR 预扣库存 ═══════════ -->
  <line x1="390" y1="120" x2="550" y2="120" stroke="rgb(83,74,183)" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="470" y="114" text-anchor="middle" fill="rgb(83,74,183)" font-size="10" font-family="system-ui, sans-serif">DECR seckill:stock:{spId}</text>
  <line x1="550" y1="135" x2="390" y2="135" stroke="rgb(83,74,183)" stroke-width="0.8" marker-end="url(#return-arrow)" stroke-dasharray="4 3"/>
  <text x="470" y="146" text-anchor="middle" fill="rgb(83,74,183)" font-size="10" font-family="system-ui, sans-serif">remaining</text>

  <!-- annotation -->
  <rect x="570" y="114" width="200" height="28" rx="4" fill="rgb(248,248,245)" stroke="rgba(31,30,29,0.1)" stroke-width="0.5"/>
  <text x="670" y="128" text-anchor="middle" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">remaining &lt; 0 → 回滚返回错误</text>

  <!-- ═══════════ ③ Redis SETNX 幂等 ═══════════ -->
  <line x1="390" y1="175" x2="550" y2="175" stroke="rgb(83,74,183)" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="470" y="169" text-anchor="middle" fill="rgb(83,74,183)" font-size="10" font-family="system-ui, sans-serif">SETNX user:{uid}:sp:{sid}</text>
  <line x1="550" y1="190" x2="390" y2="190" stroke="rgb(83,74,183)" stroke-width="0.8" marker-end="url(#return-arrow)" stroke-dasharray="4 3"/>
  <text x="470" y="201" text-anchor="middle" fill="rgb(83,74,183)" font-size="10" font-family="system-ui, sans-serif">false → 回滚返回错误</text>

  <!-- ═══════════ ④ Kafka 发送 ═══════════ -->
  <line x1="390" y1="240" x2="670" y2="240" stroke="rgb(83,74,183)" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="530" y="234" text-anchor="middle" fill="rgb(83,74,183)" font-size="10" font-family="system-ui, sans-serif">send(seckill-order, msg)</text>

  <!-- ═══════════ ⑤ 返回 PROCESSING ═══════════ -->
  <line x1="390" y1="270" x2="100" y2="270" stroke="rgb(15,110,86)" stroke-width="0.8" marker-end="url(#return-arrow)" stroke-dasharray="4 3"/>
  <text x="245" y="264" text-anchor="middle" fill="rgb(15,110,86)" font-size="11" font-family="system-ui, sans-serif">{status: "PROCESSING", messageId}</text>

  <!-- ═══════════ 时间分隔线 ═══════════ -->
  <rect x="60" y="300" width="740" height="24" rx="4" fill="rgb(248,248,245)" stroke="rgba(31,30,29,0.1)" stroke-width="0.5"/>
  <text x="400" y="316" text-anchor="middle" fill="rgb(136,135,128)" font-size="11" font-family="system-ui, sans-serif">— 异步消费（Kafka Consumer 在 stock-service 内）—</text>

  <!-- ═══════════ ⑥ 消费消息 + HTTP 幂等校验 ═══════════ -->
  <line x1="390" y1="345" x2="390" y2="370" stroke="rgb(83,74,183)" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="420" y="356" fill="rgb(83,74,183)" font-size="10" font-family="system-ui, sans-serif">消费消息</text>

  <!-- HTTP 调 order-service 幂等校验 -->
  <line x1="390" y1="400" x2="760" y2="400" stroke="rgb(186,117,23)" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="575" y="394" text-anchor="middle" fill="rgb(133,79,11)" font-size="10" font-family="system-ui, sans-serif">GET /api/order/internal/count</text>
  <line x1="760" y1="415" x2="390" y2="415" stroke="rgb(186,117,23)" stroke-width="0.8" marker-end="url(#return-arrow)" stroke-dasharray="4 3"/>
  <text x="575" y="426" text-anchor="middle" fill="rgb(133,79,11)" font-size="10" font-family="system-ui, sans-serif">count &gt; 0 → ACK 跳过</text>

  <!-- ═══════════ ⑦ 本地 TCC Try（stock_db）═════════ -->
  <rect x="355" y="455" width="70" height="50" rx="6" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="390" y="475" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="10" font-weight="500" font-family="system-ui, sans-serif">本地 TCC Try</text>
  <text x="390" y="492" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="9" font-family="system-ui, sans-serif">stock_db 事务</text>

  <text x="500" y="475" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">avail_stock -= qty</text>
  <text x="500" y="492" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">locked_stock += qty</text>

  <!-- ═══════════ ⑧ HTTP 调 order-service 创建订单 ═══════════ -->
  <line x1="390" y1="530" x2="760" y2="530" stroke="rgb(186,117,23)" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="575" y="524" text-anchor="middle" fill="rgb(133,79,11)" font-size="10" font-family="system-ui, sans-serif">POST /api/order/internal/create</text>

  <!-- order-service 内部 -->
  <rect x="710" y="545" width="100" height="50" rx="6" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="760" y="565" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="10" font-weight="500" font-family="system-ui, sans-serif">TCC Try</text>
  <text x="760" y="580" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="9" font-family="system-ui, sans-serif">order_db 事务</text>

  <text x="650" y="570" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif" text-anchor="end">创建 TRYING 订单</text>

  <line x1="760" y1="610" x2="390" y2="610" stroke="rgb(186,117,23)" stroke-width="0.8" marker-end="url(#return-arrow)" stroke-dasharray="4 3"/>
  <text x="575" y="604" text-anchor="middle" fill="rgb(133,79,11)" font-size="10" font-family="system-ui, sans-serif">ResultVO(200)</text>

  <!-- ═══════════ ⑨ 失败补偿标注 ═══════════ -->
  <rect x="40" y="640" width="720" height="60" rx="8" fill="rgb(248,248,245)" stroke="rgba(31,30,29,0.1)" stroke-width="0.5"/>
  <text x="400" y="658" text-anchor="middle" fill="rgb(61,61,58)" font-size="11" font-weight="500" font-family="system-ui, sans-serif">失败补偿（Saga 模式）</text>
  <text x="400" y="676" text-anchor="middle" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">本地 TCC Try 失败 → Redis INCR 回滚 → 不ACK(Kafka重试)</text>
  <text x="400" y="692" text-anchor="middle" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">远程订单创建失败 → 本地 TCC Cancel + Redis INCR 回滚 → 不ACK或ACK</text>
</svg>
