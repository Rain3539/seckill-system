<svg width="100%" viewBox="0 0 800 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>第七讲：服务治理与流量控制架构</title>
  <desc>Nacos + Spring Cloud Gateway + Sentinel 服务治理架构图。客户端通过 Nginx 和 Gateway 访问微服务，Nacos 提供注册发现和配置管理，Sentinel 提供限流熔断降级。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(24,95,165)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(186,117,23)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(192,57,43)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(29,158,117)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════
       标题
  ══════════════════════════════════════ -->
  <text x="400" y="30" text-anchor="middle" fill="rgb(51,51,51)" font-size="18" font-weight="700" font-family="system-ui, sans-serif">第七讲：服务治理与流量控制架构</text>

  <!-- ══════════════════════════════════════
       ROW 0 — Client
  ══════════════════════════════════════ -->
  <g>
    <rect x="310" y="52" width="180" height="44" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
    <text x="400" y="74" text-anchor="middle" dominant-baseline="central" fill="rgb(68,68,65)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Client 浏览器 / JMeter</text>
  </g>

  <!-- Client → Nginx -->
  <line x1="400" y1="96" x2="400" y2="128" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════
       ROW 1 — Nginx（静态）
  ══════════════════════════════════════ -->
  <rect x="120" y="130" width="560" height="70" rx="10" fill="rgb(225,245,238)" stroke="rgb(29,158,117)" stroke-width="0.8"/>
  <text x="400" y="155" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="15" font-weight="600" font-family="system-ui, sans-serif">Nginx :80</text>
  <text x="280" y="178" text-anchor="middle" fill="rgb(15,110,86)" font-size="11" font-family="system-ui, sans-serif">静态资源 · JS/CSS/图片 · Vue SPA</text>
  <text x="530" y="178" text-anchor="middle" fill="rgb(15,110,86)" font-size="11" font-family="system-ui, sans-serif">/api/** → proxy_pass gateway:8080</text>

  <!-- 分割线 -->
  <line x1="400" y1="138" x2="400" y2="192" stroke="rgb(29,158,117)" stroke-width="0.5" stroke-dasharray="3 2" opacity="0.4"/>

  <!-- Nginx → Gateway -->
  <line x1="400" y1="200" x2="400" y2="238" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="415" y="224" fill="rgb(136,135,128)" font-size="9" font-family="system-ui, sans-serif">API 请求</text>

  <!-- ══════════════════════════════════════
       ROW 2 — Gateway（网关）
  ══════════════════════════════════════ -->
  <rect x="120" y="240" width="560" height="70" rx="10" fill="rgb(232,230,250)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="400" y="264" text-anchor="middle" dominant-baseline="central" fill="rgb(55,44,140)" font-size="15" font-weight="700" font-family="system-ui, sans-serif">Spring Cloud Gateway :8080</text>
  <text x="250" y="288" text-anchor="middle" fill="rgb(83,74,183)" font-size="11" font-family="system-ui, sans-serif">lb://stock-service (动态路由)</text>
  <text x="550" y="288" text-anchor="middle" fill="rgb(83,74,183)" font-size="11" font-family="system-ui, sans-serif">lb://order-service (动态路由)</text>

  <!-- 分割线 -->
  <line x1="400" y1="248" x2="400" y2="302" stroke="rgb(83,74,183)" stroke-width="0.5" stroke-dasharray="3 2" opacity="0.4"/>

  <!-- ══════════════════════════════════════
       ROW 3 — 服务治理（Nacos + Sentinel）
  ══════════════════════════════════════ -->

  <!-- Gateway → Nacos -->
  <line x1="300" y1="310" x2="220" y2="348" stroke="rgb(24,95,165)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-blue)"/>
  <text x="240" y="328" fill="rgb(24,95,165)" font-size="9" font-family="system-ui, sans-serif">服务发现</text>

  <!-- Nacos -->
  <rect x="60" y="350" width="280" height="90" rx="10" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="1"/>
  <text x="200" y="376" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="15" font-weight="700" font-family="system-ui, sans-serif">Nacos Server :8848</text>
  <text x="200" y="398" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="11" font-family="system-ui, sans-serif">  服务注册中心：服务发现 + 健康检查</text>
  <text x="200" y="416" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="11" font-family="system-ui, sans-serif">  配置中心：动态属性热更新 (@RefreshScope)</text>

  <!-- Sentinel -->
  <rect x="460" y="350" width="280" height="90" rx="10" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="1"/>
  <text x="600" y="376" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-size="15" font-weight="700" font-family="system-ui, sans-serif">Sentinel Dashboard :8070</text>
  <text x="600" y="398" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-size="11" font-family="system-ui, sans-serif">  流控规则：QPS 限流 · 快速失败</text>
  <text x="600" y="416" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-size="11" font-family="system-ui, sans-serif">  降级规则：异常比例/慢调用 · 熔断</text>

  <!-- ══════════════════════════════════════
       ROW 4 — 微服务
  ══════════════════════════════════════ -->

  <!-- Nacos → stock-service -->
  <line x1="140" y1="440" x2="180" y2="478" stroke="rgb(24,95,165)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow-blue)"/>
  <text x="135" y="462" fill="rgb(24,95,165)" font-size="9" font-family="system-ui, sans-serif">注册</text>

  <!-- Nacos → order-service -->
  <line x1="260" y1="440" x2="580" y2="478" stroke="rgb(24,95,165)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow-blue)"/>
  <text x="395" y="460" fill="rgb(24,95,165)" font-size="9" font-family="system-ui, sans-serif">注册</text>

  <!-- Sentinel → stock-service -->
  <line x1="540" y1="440" x2="300" y2="478" stroke="rgb(192,57,43)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <text x="445" y="454" fill="rgb(192,57,43)" font-size="9" font-family="system-ui, sans-serif">限流/熔断</text>

  <!-- Sentinel → order-service -->
  <line x1="660" y1="440" x2="620" y2="478" stroke="rgb(192,57,43)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <text x="670" y="462" fill="rgb(192,57,43)" font-size="9" font-family="system-ui, sans-serif">限流/熔断</text>

  <!-- Gateway → stock-service -->
  <line x1="250" y1="310" x2="220" y2="478" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Gateway → order-service -->
  <line x1="550" y1="310" x2="580" y2="478" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- stock-service -->
  <rect x="80" y="480" width="320" height="110" rx="10" fill="rgb(240,247,255)" stroke="rgb(24,95,165)" stroke-width="0.8"/>
  <text x="240" y="504" text-anchor="middle" fill="rgb(12,68,124)" font-size="14" font-weight="700" font-family="system-ui, sans-serif">stock-service</text>

  <rect x="96" y="514" width="140" height="36" rx="6" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.4"/>
  <text x="166" y="532" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Instance-1 :8081</text>

  <rect x="248" y="514" width="140" height="36" rx="6" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.4"/>
  <text x="318" y="532" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Instance-2 :8083</text>

  <text x="240" y="568" text-anchor="middle" fill="rgb(100,130,170)" font-size="10" font-family="system-ui, sans-serif">@LoadBalanced RestTemplate · @SentinelResource</text>
  <text x="240" y="582" text-anchor="middle" fill="rgb(100,130,170)" font-size="10" font-family="system-ui, sans-serif">@RefreshScope 动态配置 · bootstrap.yml → Nacos</text>

  <!-- order-service -->
  <rect x="420" y="480" width="320" height="110" rx="10" fill="rgb(240,247,255)" stroke="rgb(24,95,165)" stroke-width="0.8"/>
  <text x="580" y="504" text-anchor="middle" fill="rgb(12,68,124)" font-size="14" font-weight="700" font-family="system-ui, sans-serif">order-service</text>

  <rect x="436" y="514" width="140" height="36" rx="6" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.4"/>
  <text x="506" y="532" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Instance-1 :8082</text>

  <rect x="588" y="514" width="140" height="36" rx="6" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.4"/>
  <text x="658" y="532" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Instance-2 :8084</text>

  <text x="580" y="568" text-anchor="middle" fill="rgb(100,130,170)" font-size="10" font-family="system-ui, sans-serif">@LoadBalanced RestTemplate · @SentinelResource</text>
  <text x="580" y="582" text-anchor="middle" fill="rgb(100,130,170)" font-size="10" font-family="system-ui, sans-serif">@RefreshScope 动态配置 · bootstrap.yml → Nacos</text>

  <!-- 服务间调用 -->
  <path d="M400 540 L420 540" fill="none" stroke="rgb(186,117,23)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow-orange)"/>
  <path d="M420 555 L400 555" fill="none" stroke="rgb(186,117,23)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow-orange)"/>
  <text x="410" y="533" text-anchor="middle" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif">HTTP TCC</text>

  <!-- ══════════════════════════════════════
       图例
  ══════════════════════════════════════ -->
  <rect x="80" y="610" width="660" height="90" rx="8" fill="rgb(248,248,245)" stroke="rgba(31,30,29,0.15)" stroke-width="0.5"/>
  <text x="100" y="632" fill="rgb(61,61,58)" font-size="12" font-weight="600" font-family="system-ui, sans-serif">图例</text>

  <line x1="100" y1="650" x2="130" y2="650" stroke="rgba(31,30,29,0.3)" stroke-width="1"/>
  <text x="136" y="654" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">API 路由 (Gateway)</text>

  <line x1="260" y1="650" x2="290" y2="650" stroke="rgb(24,95,165)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="296" y="654" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">Nacos 注册/发现</text>

  <line x1="410" y1="650" x2="440" y2="650" stroke="rgb(192,57,43)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="446" y="654" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">Sentinel 限流/熔断</text>

  <line x1="570" y1="650" x2="600" y2="650" stroke="rgb(186,117,23)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="606" y="654" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">TCC 事务调用</text>

  <!-- 改造前 → 改造后 -->
  <text x="400" y="686" text-anchor="middle" fill="rgb(136,135,128)" font-size="10" font-family="system-ui, sans-serif">改造前：Nginx upstream 硬编码 → RestTemplate 硬编码 URL</text>
  <text x="400" y="700" text-anchor="middle" fill="rgb(136,135,128)" font-size="10" font-family="system-ui, sans-serif">改造后：Nacos 服务名发现 + Gateway 动态路由 + Sentinel 流量治理 + @RefreshScope 配置热更新</text>
</svg>
