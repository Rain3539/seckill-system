<svg width="100%" viewBox="0 0 780 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>读写分离路由图（微服务版）</title>
  <desc>stock-service 和 order-service 各自通过 DataSourceAspect 路由决策，写操作走 Master Pool，读操作走 Slave Pool，各自连接独立的 MySQL 主从集群。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ════════════════ stock-service 路由 ════════════════ -->
  <!-- stock-service App -->
  <rect x="60" y="24" width="260" height="44" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="190" y="46" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">stock-service</text>

  <!-- ↓ -->
  <line x1="190" y1="68" x2="190" y2="108" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- DataSourceAspect -->
  <rect x="60" y="110" width="260" height="44" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="190" y="130" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">DataSourceAspect</text>
  <text x="190" y="146" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="10" font-family="system-ui, sans-serif">@Order(1) 路由决策</text>

  <!-- 读操作 left -->
  <path d="M130 154 L80 154 L80 220" fill="none" stroke="rgb(29,158,117)" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="96" y="196" text-anchor="middle" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">读</text>

  <!-- 写操作 right -->
  <path d="M250 154 L300 154 L300 220" fill="none" stroke="rgb(216,90,48)" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="284" y="196" text-anchor="middle" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">写</text>

  <!-- Slave Pool -->
  <rect x="16" y="222" width="128" height="44" rx="6" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="80" y="240" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Slave Pool</text>
  <text x="80" y="256" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="10" font-family="system-ui, sans-serif">HikariCP max=30</text>

  <!-- Master Pool -->
  <rect x="236" y="222" width="128" height="44" rx="6" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="300" y="240" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Master Pool</text>
  <text x="300" y="256" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="10" font-family="system-ui, sans-serif">HikariCP max=20</text>

  <!-- Pool → MySQL -->
  <line x1="80" y1="266" x2="80" y2="340" stroke="rgb(29,158,117)" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="300" y1="266" x2="300" y2="340" stroke="rgb(216,90,48)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- stock MySQL Master -->
  <rect x="220" y="342" width="160" height="44" rx="6" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="300" y="360" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">stock Master :3308</text>
  <text x="300" y="376" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="10" font-family="system-ui, sans-serif">写 · binlog ROW</text>

  <!-- stock MySQL Slave -->
  <rect x="0" y="342" width="160" height="44" rx="6" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="80" y="360" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">stock Slave :3309</text>
  <text x="80" y="376" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="10" font-family="system-ui, sans-serif">读 · relay-log</text>

  <!-- binlog sync -->
  <line x1="160" y1="364" x2="220" y2="364" stroke="rgb(186,117,23)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="190" y="358" text-anchor="middle" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif">binlog</text>

  <!-- ════════════════ order-service 路由 ════════════════ -->
  <!-- order-service App -->
  <rect x="460" y="24" width="260" height="44" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="590" y="46" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">order-service</text>

  <!-- ↓ -->
  <line x1="590" y1="68" x2="590" y2="108" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- DataSourceAspect -->
  <rect x="460" y="110" width="260" height="44" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="590" y="130" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">DataSourceAspect</text>
  <text x="590" y="146" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="10" font-family="system-ui, sans-serif">@Order(1) 路由决策</text>

  <!-- 读操作 left -->
  <path d="M530 154 L480 154 L480 220" fill="none" stroke="rgb(29,158,117)" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="496" y="196" text-anchor="middle" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">读</text>

  <!-- 写操作 right -->
  <path d="M650 154 L700 154 L700 220" fill="none" stroke="rgb(216,90,48)" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="684" y="196" text-anchor="middle" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">写</text>

  <!-- Slave Pool -->
  <rect x="416" y="222" width="128" height="44" rx="6" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="480" y="240" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Slave Pool</text>
  <text x="480" y="256" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="10" font-family="system-ui, sans-serif">HikariCP max=30</text>

  <!-- Master Pool -->
  <rect x="636" y="222" width="128" height="44" rx="6" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="700" y="240" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Master Pool</text>
  <text x="700" y="256" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="10" font-family="system-ui, sans-serif">HikariCP max=20</text>

  <!-- Pool → MySQL -->
  <line x1="480" y1="266" x2="480" y2="340" stroke="rgb(29,158,117)" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="700" y1="266" x2="700" y2="340" stroke="rgb(216,90,48)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- order MySQL Master -->
  <rect x="620" y="342" width="160" height="44" rx="6" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="700" y="360" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">order Master :3310</text>
  <text x="700" y="376" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="10" font-family="system-ui, sans-serif">写 · binlog ROW</text>

  <!-- order MySQL Slave -->
  <rect x="400" y="342" width="160" height="44" rx="6" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="480" y="360" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">order Slave :3311</text>
  <text x="480" y="376" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="10" font-family="system-ui, sans-serif">读 · relay-log</text>

  <!-- binlog sync -->
  <line x1="560" y1="364" x2="620" y2="364" stroke="rgb(186,117,23)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="590" y="358" text-anchor="middle" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif">binlog</text>

  <!-- ══ 底部说明 ══ -->
  <rect x="50" y="420" width="680" height="80" rx="8" fill="rgb(248,248,245)" stroke="rgba(31,30,29,0.15)" stroke-width="0.5"/>
  <text x="390" y="440" text-anchor="middle" fill="rgb(61,61,58)" font-size="11" font-weight="500" font-family="system-ui, sans-serif">两组独立读写分离集群</text>
  <text x="390" y="460" text-anchor="middle" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">stock-service → stock_db (Master :3308 ←binlog→ Slave :3309)</text>
  <text x="390" y="478" text-anchor="middle" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">order-service → order_db (Master :3310 ←binlog→ Slave :3311)</text>
  <text x="390" y="492" text-anchor="middle" fill="rgb(136,135,128)" font-size="10" font-family="system-ui, sans-serif">路由规则：@DS注解 > 方法名约定(get/find/list→SLAVE) > 兜底MASTER</text>
</svg>
