<svg width="100%" viewBox="0 0 780 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>秒杀系统架构流程图（微服务版）</title>
  <desc>从用户请求经 Nginx 到 stock-service 的完整秒杀订单处理流程，包含 Redis、Kafka Producer、Kafka Consumer、跨服务 HTTP 调用 Order Service，最终写入 stock_db 和 order_db。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ═══════════ 入口行 ═══════════ -->
  <text x="40" y="56" text-anchor="start" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">用户请求</text>
  <line x1="100" y1="52" x2="128" y2="52" stroke="rgb(107,143,171)" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="130" y="38" width="72" height="28" rx="6" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="166" y="52" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12" font-family="system-ui, sans-serif">Nginx</text>

  <line x1="202" y1="52" x2="230" y2="52" stroke="rgb(107,143,171)" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="232" y="38" width="120" height="28" rx="6" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="292" y="52" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12" font-family="system-ui, sans-serif">stock-service</text>

  <!-- ═══════════ Step 1 & 2: Redis ═══════════ -->
  <line x1="292" y1="66" x2="292" y2="114" stroke="rgb(155,181,200)" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="220" y="116" width="144" height="64" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="292" y="140" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Redis</text>
  <text x="292" y="162" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12" font-family="system-ui, sans-serif">DECR</text>

  <line x1="364" y1="136" x2="390" y2="136" stroke="rgb(115,114,108)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="396" y="136" dominant-baseline="central" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">Step 1: 原子预扣库存</text>
  <line x1="364" y1="158" x2="390" y2="158" stroke="rgb(115,114,108)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="396" y="158" dominant-baseline="central" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">Step 2: SETNX幂等校验</text>

  <!-- ═══════════ Step 3: Kafka Producer ═══════════ -->
  <line x1="292" y1="180" x2="292" y2="234" stroke="rgb(155,181,200)" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="220" y="236" width="144" height="64" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="292" y="258" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Kafka</text>
  <text x="292" y="278" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12" font-family="system-ui, sans-serif">Producer</text>

  <line x1="364" y1="254" x2="390" y2="254" stroke="rgb(115,114,108)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="396" y="254" dominant-baseline="central" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">Step 3: 异步发送订单消息</text>
  <line x1="364" y1="274" x2="390" y2="274" stroke="rgb(115,114,108)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="396" y="274" dominant-baseline="central" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">立即返回 "PROCESSING"</text>

  <!-- ═══════════ Step 4: Kafka Consumer ═══════════ -->
  <line x1="292" y1="300" x2="292" y2="354" stroke="rgb(155,181,200)" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="220" y="356" width="144" height="64" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="292" y="378" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Kafka</text>
  <text x="292" y="398" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12" font-family="system-ui, sans-serif">Consumer</text>

  <line x1="364" y1="370" x2="390" y2="370" stroke="rgb(115,114,108)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="396" y="370" dominant-baseline="central" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">Step 4: 消费消息</text>
  <line x1="364" y1="390" x2="390" y2="390" stroke="rgb(115,114,108)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="396" y="390" dominant-baseline="central" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">HTTP 幂等校验 → 本地TCC Try（库存预留）</text>

  <!-- ═══════════ 左侧分支: stock_db ═══════════ -->
  <line x1="260" y1="420" x2="170" y2="474" stroke="rgb(155,181,200)" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="100" y="476" width="140" height="80" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="170" y="504" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">stock_db</text>
  <text x="170" y="524" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="11" font-family="system-ui, sans-serif">Master :3308</text>

  <line x1="170" y1="500" x2="80" y2="500" stroke="rgb(115,114,108)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="76" y="500" dominant-baseline="central" fill="rgb(61,61,58)" font-size="11" font-family="system-ui, sans-serif" text-anchor="end">TCC Try: avail→locked</text>
  <line x1="170" y1="520" x2="80" y2="520" stroke="rgb(115,114,108)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="76" y="520" dominant-baseline="central" fill="rgb(61,61,58)" font-size="11" font-family="system-ui, sans-serif" text-anchor="end">TCC Confirm: 永久扣减</text>
  <line x1="170" y1="540" x2="80" y2="540" stroke="rgb(115,114,108)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="76" y="540" dominant-baseline="central" fill="rgb(61,61,58)" font-size="11" font-family="system-ui, sans-serif" text-anchor="end">TCC Cancel: 释放库存</text>

  <!-- ═══════════ 右侧分支: HTTP → order-service ═══════════ -->
  <line x1="324" y1="420" x2="470" y2="444" stroke="rgb(186,117,23)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="400" y="430" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif">HTTP TCC</text>

  <rect x="472" y="434" width="130" height="40" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="537" y="454" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12" font-family="system-ui, sans-serif">order-service</text>

  <!-- HTTP → order_db -->
  <line x1="537" y1="474" x2="537" y2="520" stroke="rgb(155,181,200)" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="472" y="522" width="130" height="80" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="537" y="550" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">order_db</text>
  <text x="537" y="570" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="11" font-family="system-ui, sans-serif">Master :3310</text>

  <line x1="602" y1="548" x2="630" y2="548" stroke="rgb(115,114,108)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="636" y="548" dominant-baseline="central" fill="rgb(61,61,58)" font-size="11" font-family="system-ui, sans-serif">TCC Try: 创建TRYING订单</text>
  <line x1="602" y1="568" x2="630" y2="568" stroke="rgb(115,114,108)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="636" y="568" dominant-baseline="central" fill="rgb(61,61,58)" font-size="11" font-family="system-ui, sans-serif">TCC Confirm: TRYING→PENDING</text>
  <line x1="602" y1="588" x2="630" y2="588" stroke="rgb(115,114,108)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="636" y="588" dominant-baseline="central" fill="rgb(61,61,58)" font-size="11" font-family="system-ui, sans-serif">TCC Cancel: TRYING→CANCELLED</text>
</svg>
