<svg width="100%" viewBox="0 0 780 580" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Cache-Aside 整体架构图（微服务版）</title>
  <desc>Client 通过 Nginx 按 URL 前缀路由到 stock-service / order-service，两组微服务各自采用 Cache-Aside 模式与 Redis 交互，各自连接独立的 MySQL 主从数据库集群。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect x="280" y="20" width="200" height="44" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="380" y="42" text-anchor="middle" dominant-baseline="central" fill="rgb(68,68,65)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Client 客户端</text>

  <!-- Client ↓ Nginx -->
  <line x1="380" y1="64" x2="380" y2="90" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Nginx -->
  <rect x="140" y="92" width="200" height="50" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="240" y="112" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Nginx</text>
  <text x="240" y="130" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="11" font-family="system-ui, sans-serif">反向代理 / 负载均衡</text>

  <!-- Cache-Aside note -->
  <rect x="460" y="96" width="200" height="72" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="560" y="116" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Cache-Aside 模式</text>
  <text x="560" y="136" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="11" font-family="system-ui, sans-serif">1. 先查缓存  2. 未命中再查 DB</text>
  <text x="560" y="154" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="11" font-family="system-ui, sans-serif">3. 回写缓存</text>

  <!-- Nginx routing labels -->
  <text x="240" y="156" text-anchor="middle" fill="rgb(136,135,128)" font-size="10" font-family="system-ui, sans-serif">/api/seckill|product|stock → stock_cluster</text>
  <text x="240" y="168" text-anchor="middle" fill="rgb(136,135,128)" font-size="10" font-family="system-ui, sans-serif">/api/order|user → order_cluster</text>

  <!-- Nginx ↓ stock-service -->
  <line x1="200" y1="142" x2="160" y2="196" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Nginx ↓ order-service -->
  <line x1="280" y1="142" x2="560" y2="196" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══ stock-service ══ -->
  <rect x="56" y="198" width="210" height="60" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="161" y="218" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">stock-service</text>
  <text x="161" y="238" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="11" font-family="system-ui, sans-serif">商品/库存/秒杀 · Kafka</text>

  <!-- ══ order-service ══ -->
  <rect x="500" y="198" width="210" height="60" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="605" y="218" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">order-service</text>
  <text x="605" y="238" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="11" font-family="system-ui, sans-serif">用户/订单 · TCC 超时任务</text>

  <!-- Inter-service HTTP -->
  <path d="M266 228 L500 228" fill="none" stroke="rgb(186,117,23)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="383" y="220" text-anchor="middle" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif">HTTP REST API</text>

  <!-- ══ Redis (共享) ══ -->
  <rect x="280" y="300" width="200" height="64" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="380" y="324" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Redis 7 :6379</text>
  <text x="380" y="344" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="11" font-family="system-ui, sans-serif">商品缓存 · 库存预扣 · 分布式锁</text>

  <!-- stock-service → Redis -->
  <line x1="161" y1="258" x2="320" y2="300" stroke="rgb(83,74,183)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- order-service → Redis -->
  <line x1="605" y1="258" x2="440" y2="300" stroke="rgb(83,74,183)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ══ stock_db 集群 ══ -->
  <text x="161" y="392" text-anchor="middle" fill="rgb(153,60,29)" font-size="11" font-weight="600" font-family="system-ui, sans-serif">stock_db 集群</text>

  <!-- stock Master -->
  <rect x="56" y="402" width="100" height="48" rx="6" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="106" y="422" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Master</text>
  <text x="106" y="438" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="10" font-family="system-ui, sans-serif">:3308 写</text>

  <!-- stock Slave -->
  <rect x="170" y="402" width="100" height="48" rx="6" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="220" y="422" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Slave</text>
  <text x="220" y="438" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="10" font-family="system-ui, sans-serif">:3309 读</text>

  <!-- stock binlog -->
  <line x1="156" y1="426" x2="170" y2="426" stroke="rgb(186,117,23)" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <text x="163" y="420" text-anchor="middle" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif">binlog</text>

  <!-- stock-service → stock DB -->
  <line x1="130" y1="258" x2="106" y2="402" stroke="rgb(216,90,48)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="192" y1="258" x2="220" y2="402" stroke="rgb(136,135,128)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ══ order_db 集群 ══ -->
  <text x="605" y="392" text-anchor="middle" fill="rgb(153,60,29)" font-size="11" font-weight="600" font-family="system-ui, sans-serif">order_db 集群</text>

  <!-- order Master -->
  <rect x="500" y="402" width="100" height="48" rx="6" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="550" y="422" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Master</text>
  <text x="550" y="438" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="10" font-family="system-ui, sans-serif">:3310 写</text>

  <!-- order Slave -->
  <rect x="614" y="402" width="100" height="48" rx="6" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="664" y="422" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="12" font-weight="500" font-family="system-ui, sans-serif">Slave</text>
  <text x="664" y="438" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="10" font-family="system-ui, sans-serif">:3311 读</text>

  <!-- order binlog -->
  <line x1="600" y1="426" x2="614" y2="426" stroke="rgb(186,117,23)" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <text x="607" y="420" text-anchor="middle" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif">binlog</text>

  <!-- order-service → order DB -->
  <line x1="574" y1="258" x2="550" y2="402" stroke="rgb(216,90,48)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="636" y1="258" x2="664" y2="402" stroke="rgb(136,135,128)" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- 返回响应 -->
  <path d="M700 228 C730 228 740 50 440 50" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="710" y="140" fill="rgb(61,61,58)" font-size="12" font-family="system-ui, sans-serif">返回响应</text>

  <!-- 底部说明 -->
  <rect x="50" y="480" width="680" height="76" rx="8" fill="rgb(248,248,245)" stroke="rgba(31,30,29,0.15)" stroke-width="0.5"/>
  <text x="390" y="500" text-anchor="middle" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">两组独立数据库集群，各自实现 Cache-Aside 模式：stock-service 缓存商品数据 → stock_db，order-service 缓存订单数据 → order_db</text>
  <text x="390" y="518" text-anchor="middle" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">读写分离：AOP 拦截 → get/find/list 方法路由 Slave，其余路由 Master（DynamicDataSource + ThreadLocal）</text>
  <text x="390" y="536" text-anchor="middle" fill="rgb(136,135,128)" font-size="10" font-family="system-ui, sans-serif">两组独立数据库，服务间通过 HTTP REST API 进行跨服务数据访问</text>
</svg>
