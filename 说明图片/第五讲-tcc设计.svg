<svg width="100%" viewBox="0 0 780 640" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>TCC 跨服务事务结构图（微服务版）</title>
  <desc>order-service 的 OrderServiceImpl 作为隐式协调器，本地调用 TccOrderParticipant 操作 order_db，通过 HTTP 调用 stock-service 的 TccStockParticipant 操作 stock_db，Cancel 时同步回滚 Redis。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ═══════════ 调用入口 ═══════════ -->
  <rect x="60" y="24" width="200" height="44" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="160" y="46" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="13" font-weight="500" font-family="system-ui, sans-serif">KafkaStockConsumer</text>

  <rect x="520" y="24" width="200" height="44" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="620" y="46" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="13" font-weight="500" font-family="system-ui, sans-serif">SeckillOrderTimeoutTask</text>

  <!-- ═══════════ 隐式协调器 ═══════════ -->
  <rect x="220" y="100" width="340" height="72" rx="10" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="390" y="125" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">OrderServiceImpl（隐式协调器）</text>
  <text x="390" y="148" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="11" font-family="system-ui, sans-serif">本地 Participant + RestTemplate HTTP 调用</text>

  <!-- 入口 → 协调器 -->
  <line x1="160" y1="68" x2="300" y2="100" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="620" y1="68" x2="480" y2="100" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ═══════════ 左侧：本地 TCC（order-service）═════════ -->
  <line x1="320" y1="172" x2="170" y2="218" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="230" y="192" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">本地调用</text>

  <rect x="80" y="220" width="180" height="110" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="170" y="242" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">TccOrderParticipant</text>
  <line x1="88" y1="254" x2="252" y2="254" stroke="rgb(83,74,183)" stroke-width="0.4" opacity="0.4"/>
  <text x="170" y="274" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12" font-family="system-ui, sans-serif">Try：建单（TRYING）</text>
  <text x="170" y="294" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12" font-family="system-ui, sans-serif">Confirm：→ PENDING</text>
  <text x="170" y="314" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12" font-family="system-ui, sans-serif">Cancel：→ CANCELLED</text>

  <!-- TccOrderParticipant → order_db -->
  <line x1="170" y1="330" x2="170" y2="400" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="80" y="402" width="180" height="90" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="170" y="424" text-anchor="middle" dominant-baseline="central" fill="rgb(68,68,65)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">order_db</text>
  <line x1="88" y1="436" x2="252" y2="436" stroke="rgb(95,94,90)" stroke-width="0.4" opacity="0.4"/>
  <text x="170" y="454" text-anchor="middle" dominant-baseline="central" fill="rgb(95,94,90)" font-size="11" font-family="system-ui, sans-serif">status</text>
  <text x="170" y="472" text-anchor="middle" dominant-baseline="central" fill="rgb(95,94,90)" font-size="11" font-family="system-ui, sans-serif">timeout_at</text>
  <text x="170" y="490" text-anchor="middle" dominant-baseline="central" fill="rgb(95,94,90)" font-size="11" font-family="system-ui, sans-serif">乐观锁 status 条件更新</text>

  <!-- ═══════════ 右侧：HTTP 远程调用 stock-service ═══════════ -->
  <line x1="460" y1="172" x2="610" y2="218" stroke="rgb(186,117,23)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="550" y="192" fill="rgb(133,79,11)" font-size="10" font-family="system-ui, sans-serif">HTTP 调用</text>

  <rect x="520" y="220" width="180" height="110" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="610" y="242" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">TccStockParticipant</text>
  <line x1="528" y1="254" x2="692" y2="254" stroke="rgb(15,110,86)" stroke-width="0.4" opacity="0.4"/>
  <text x="610" y="274" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12" font-family="system-ui, sans-serif">Try：预留库存</text>
  <text x="610" y="294" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12" font-family="system-ui, sans-serif">Confirm：永久扣减</text>
  <text x="610" y="314" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12" font-family="system-ui, sans-serif">Cancel：释放锁定</text>

  <!-- TccStockParticipant → stock_db -->
  <line x1="610" y1="330" x2="610" y2="400" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="520" y="402" width="180" height="90" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="610" y="424" text-anchor="middle" dominant-baseline="central" fill="rgb(68,68,65)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">stock_db</text>
  <line x1="528" y1="436" x2="692" y2="436" stroke="rgb(95,94,90)" stroke-width="0.4" opacity="0.4"/>
  <text x="610" y="454" text-anchor="middle" dominant-baseline="central" fill="rgb(95,94,90)" font-size="11" font-family="system-ui, sans-serif">avail_stock</text>
  <text x="610" y="472" text-anchor="middle" dominant-baseline="central" fill="rgb(95,94,90)" font-size="11" font-family="system-ui, sans-serif">locked_stock</text>
  <text x="610" y="490" text-anchor="middle" dominant-baseline="central" fill="rgb(95,94,90)" font-size="11" font-family="system-ui, sans-serif">乐观锁 version 条件更新</text>

  <!-- ═══════════ HTTP 端点标注 ═══════════ -->
  <rect x="500" y="262" width="16" height="36" rx="2" fill="rgb(186,117,23)" opacity="0.15"/>
  <text x="496" y="274" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif" text-anchor="end">/api/stock/reserve</text>
  <text x="496" y="288" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif" text-anchor="end">/api/stock/confirm</text>
  <text x="496" y="302" fill="rgb(133,79,11)" font-size="9" font-family="system-ui, sans-serif" text-anchor="end">/api/stock/cancel</text>

  <!-- ═══════════ Cancel 时 Redis 回滚 ═══════════ -->
  <line x1="610" y1="492" x2="610" y2="540" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="520" y="542" width="180" height="60" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="610" y="564" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Redis</text>
  <text x="610" y="584" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="11" font-family="system-ui, sans-serif">INCR 回滚预扣库存</text>

  <!-- ═══════════ 底部图例 ═══════════ -->
  <rect x="120" y="542" width="300" height="80" rx="8" fill="rgb(248,248,245)" stroke="rgba(31,30,29,0.1)" stroke-width="0.5"/>
  <text x="270" y="562" text-anchor="middle" fill="rgb(61,61,58)" font-size="11" font-weight="500" font-family="system-ui, sans-serif">跨服务 TCC 流程</text>
  <text x="270" y="580" text-anchor="middle" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">Try：本地建TRYING单 → HTTP预留库存</text>
  <text x="270" y="596" text-anchor="middle" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">Confirm：本地→PENDING → HTTP扣减库存</text>
  <text x="270" y="612" text-anchor="middle" fill="rgb(61,61,58)" font-size="10" font-family="system-ui, sans-serif">Cancel：本地→CANCELLED → HTTP释放库存 → Redis回滚</text>
</svg>
