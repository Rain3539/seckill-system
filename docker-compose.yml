version: '3.8'

# ======================================================================
# 秒杀系统 —— 微服务架构（订单服务 + 库存服务）
#
# 架构：
#   stock-mysql-master (3308) ← stock_db 主库（写）
#   stock-mysql-slave  (3309) ← stock_db 从库（读）
#   order-mysql-master (3310) ← order_db 主库（写）
#   order-mysql-slave  (3311) ← order_db 从库（读）
#   redis              (6379) ← 共享缓存
#   kafka              (9092) ← 异步订单处理
#   stock-service-1/2  (8081/8083) ← 库存服务双实例
#   order-service-1/2  (8082/8084) ← 订单服务双实例
#   nginx              (80)   ← 反代 + 负载均衡
#
# 快速启动：
#   docker-compose up -d
#   # 等待 ~30s 让主从完成初始化，然后手动触发复制配置：
#   docker-compose exec stock-mysql-slave bash /docker-entrypoint-initdb.d/02-setup-replication.sh
#   docker-compose exec order-mysql-slave bash /docker-entrypoint-initdb.d/02-setup-replication.sh
# ======================================================================

services:

  # ── Stock MySQL 主库（写）──────────────────────────────────────────
  stock-mysql-master:
    image: mysql:8.0
    container_name: seckill-stock-mysql-master
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --default-time-zone=+08:00
      - --default-authentication-plugin=mysql_native_password
      - --server-id=10
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: stock_db
      MYSQL_USER: stock
      MYSQL_PASSWORD: ${STOCK_PASSWORD:-stock123}
      TZ: Asia/Shanghai
    ports:
      - "3308:3306"
    volumes:
      - stock_master_data:/var/lib/mysql
      - ./mysql/master/init-stock-master.sql:/docker-entrypoint-initdb.d/init-stock-master.sql
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Stock MySQL 从库（读）──────────────────────────────────────────
  stock-mysql-slave:
    image: mysql:8.0
    container_name: seckill-stock-mysql-slave
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --default-time-zone=+08:00
      - --default-authentication-plugin=mysql_native_password
      - --server-id=11
      - --relay-log=relay-bin
      - --log-slave-updates=ON
      - --read-only=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: stock_db
      MYSQL_USER: stock_ro
      MYSQL_PASSWORD: ${STOCK_SLAVE_PASSWORD:-stock_ro123}
      TZ: Asia/Shanghai
    ports:
      - "3309:3306"
    volumes:
      - stock_slave_data:/var/lib/mysql
      - ./mysql/stock-slave/init-stock-slave.sql:/docker-entrypoint-initdb.d/01-init-stock-slave.sql
      - ./mysql/stock-slave/setup-stock-replication.sh:/docker-entrypoint-initdb.d/02-setup-stock-replication.sh
    depends_on:
      stock-mysql-master:
        condition: service_healthy
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Order MySQL 主库（写）──────────────────────────────────────────
  order-mysql-master:
    image: mysql:8.0
    container_name: seckill-order-mysql-master
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --default-time-zone=+08:00
      - --default-authentication-plugin=mysql_native_password
      - --server-id=20
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: order_db
      MYSQL_USER: order_user
      MYSQL_PASSWORD: ${ORDER_PASSWORD:-order123}
      TZ: Asia/Shanghai
    ports:
      - "3310:3306"
    volumes:
      - order_master_data:/var/lib/mysql
      - ./mysql/master/init-order-master.sql:/docker-entrypoint-initdb.d/init-order-master.sql
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Order MySQL 从库（读）──────────────────────────────────────────
  order-mysql-slave:
    image: mysql:8.0
    container_name: seckill-order-mysql-slave
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --default-time-zone=+08:00
      - --default-authentication-plugin=mysql_native_password
      - --server-id=21
      - --relay-log=relay-bin
      - --log-slave-updates=ON
      - --read-only=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: order_db
      MYSQL_USER: order_ro
      MYSQL_PASSWORD: ${ORDER_SLAVE_PASSWORD:-order_ro123}
      TZ: Asia/Shanghai
    ports:
      - "3311:3306"
    volumes:
      - order_slave_data:/var/lib/mysql
      - ./mysql/order-slave/init-order-slave.sql:/docker-entrypoint-initdb.d/01-init-order-slave.sql
      - ./mysql/order-slave/setup-order-replication.sh:/docker-entrypoint-initdb.d/02-setup-order-replication.sh
    depends_on:
      order-mysql-master:
        condition: service_healthy
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Nacos 注册中心 + 配置中心 ──────────────────────────────────────────
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: seckill-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      SPRING_DATASOURCE_PLATFORM: ""
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
      TZ: Asia/Shanghai
    volumes:
      - nacos_data:/home/nacos/data
      - nacos_logs:/home/nacos/logs
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/v1/console/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Sentinel 流量治理控制台 ────────────────────────────────────────────
  sentinel:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: seckill-sentinel
    ports:
      - "8070:8858"
    environment:
      TZ: Asia/Shanghai
    networks:
      - seckill-net

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka（单节点 + KRaft，无需 ZooKeeper）──────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: seckill-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Stock Service 实例 1 ──────────────────────────────────────────────
  stock-service-1:
    build:
      context: ./stock-service
      dockerfile: Dockerfile
    container_name: seckill-stock-service-1
    ports:
      - "8081:8081"
    environment:
      - MASTER_DATASOURCE_URL=jdbc:mysql://stock-mysql-master:3306/stock_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - MASTER_DATASOURCE_USERNAME=stock
      - MASTER_DATASOURCE_PASSWORD=${STOCK_PASSWORD:-stock123}
      - SLAVE_DATASOURCE_URL=jdbc:mysql://stock-mysql-slave:3306/stock_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - SLAVE_DATASOURCE_USERNAME=stock_ro
      - SLAVE_DATASOURCE_PASSWORD=${STOCK_SLAVE_PASSWORD:-stock_ro123}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - NACOS_SERVER_ADDR=nacos:8848
      - SENTINEL_DASHBOARD=sentinel:8858
      - JWT_SECRET=${JWT_SECRET:-seckill-jwt-secret-key-2024-very-long-string-12345678901234567890}
      - INSTANCE_ID=stock-service-1
      - TZ=Asia/Shanghai
    depends_on:
      stock-mysql-master:
        condition: service_healthy
      stock-mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - seckill-net
    restart: on-failure

  # ── Stock Service 实例 2 ──────────────────────────────────────────────
  stock-service-2:
    build:
      context: ./stock-service
      dockerfile: Dockerfile
    container_name: seckill-stock-service-2
    ports:
      - "8083:8081"
    environment:
      - MASTER_DATASOURCE_URL=jdbc:mysql://stock-mysql-master:3306/stock_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - MASTER_DATASOURCE_USERNAME=stock
      - MASTER_DATASOURCE_PASSWORD=${STOCK_PASSWORD:-stock123}
      - SLAVE_DATASOURCE_URL=jdbc:mysql://stock-mysql-slave:3306/stock_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - SLAVE_DATASOURCE_USERNAME=stock_ro
      - SLAVE_DATASOURCE_PASSWORD=${STOCK_SLAVE_PASSWORD:-stock_ro123}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - NACOS_SERVER_ADDR=nacos:8848
      - SENTINEL_DASHBOARD=sentinel:8858
      - JWT_SECRET=${JWT_SECRET:-seckill-jwt-secret-key-2024-very-long-string-12345678901234567890}
      - INSTANCE_ID=stock-service-2
      - TZ=Asia/Shanghai
    depends_on:
      stock-mysql-master:
        condition: service_healthy
      stock-mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - seckill-net
    restart: on-failure

  # ── Order Service 实例 1 ──────────────────────────────────────────────
  order-service-1:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: seckill-order-service-1
    ports:
      - "8082:8082"
    environment:
      - MASTER_DATASOURCE_URL=jdbc:mysql://order-mysql-master:3306/order_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - MASTER_DATASOURCE_USERNAME=order_user
      - MASTER_DATASOURCE_PASSWORD=${ORDER_PASSWORD:-order123}
      - SLAVE_DATASOURCE_URL=jdbc:mysql://order-mysql-slave:3306/order_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - SLAVE_DATASOURCE_USERNAME=order_ro
      - SLAVE_DATASOURCE_PASSWORD=${ORDER_SLAVE_PASSWORD:-order_ro123}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - NACOS_SERVER_ADDR=nacos:8848
      - SENTINEL_DASHBOARD=sentinel:8858
      - JWT_SECRET=${JWT_SECRET:-seckill-jwt-secret-key-2024-very-long-string-12345678901234567890}
      - INSTANCE_ID=order-service-1
      - TZ=Asia/Shanghai
    depends_on:
      order-mysql-master:
        condition: service_healthy
      order-mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - seckill-net
    restart: on-failure

  # ── Order Service 实例 2 ──────────────────────────────────────────────
  order-service-2:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: seckill-order-service-2
    ports:
      - "8084:8082"
    environment:
      - MASTER_DATASOURCE_URL=jdbc:mysql://order-mysql-master:3306/order_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - MASTER_DATASOURCE_USERNAME=order_user
      - MASTER_DATASOURCE_PASSWORD=${ORDER_PASSWORD:-order123}
      - SLAVE_DATASOURCE_URL=jdbc:mysql://order-mysql-slave:3306/order_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - SLAVE_DATASOURCE_USERNAME=order_ro
      - SLAVE_DATASOURCE_PASSWORD=${ORDER_SLAVE_PASSWORD:-order_ro123}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - NACOS_SERVER_ADDR=nacos:8848
      - SENTINEL_DASHBOARD=sentinel:8858
      - JWT_SECRET=${JWT_SECRET:-seckill-jwt-secret-key-2024-very-long-string-12345678901234567890}
      - INSTANCE_ID=order-service-2
      - TZ=Asia/Shanghai
    depends_on:
      order-mysql-master:
        condition: service_healthy
      order-mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - seckill-net
    restart: on-failure

  # ── Spring Cloud Gateway 网关 ─────────────────────────────────────────
  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: seckill-gateway
    ports:
      - "8080:8080"
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - TZ=Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - seckill-net
    restart: on-failure

  # ── Nginx 反代 ────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: seckill-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/static:/usr/share/nginx/static:ro
    depends_on:
      - gateway-service
    networks:
      - seckill-net
    restart: always

volumes:
  stock_master_data:
  stock_slave_data:
  order_master_data:
  order_slave_data:
  redis_data:
  kafka_data:
  nacos_data:
  nacos_logs:

networks:
  seckill-net:
    driver: bridge
