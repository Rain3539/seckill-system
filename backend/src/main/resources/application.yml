spring:
  application:
    name: seckill-system

  profiles:
    active: dev

  # ── 禁用 Boot 的单数据源自动装配，由 DataSourceConfig 手动装配 ──
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

  datasource:
    # ── 主库（写：INSERT / UPDATE / DELETE）──────────────────────────
    master:
      jdbc-url: ${MASTER_DATASOURCE_URL:jdbc:mysql://localhost:3306/seckill_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      username: ${MASTER_DATASOURCE_USERNAME:seckill}
      password: ${MASTER_DATASOURCE_PASSWORD:seckill123}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        pool-name: HikariMaster
        minimum-idle: 5
        maximum-pool-size: 20
        connection-timeout: 30000
        idle-timeout: 600000

    # ── 从库（读：SELECT）────────────────────────────────────────────
    slave:
      jdbc-url: ${SLAVE_DATASOURCE_URL:jdbc:mysql://localhost:3307/seckill_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      username: ${SLAVE_DATASOURCE_USERNAME:seckill_ro}
      password: ${SLAVE_DATASOURCE_PASSWORD:seckill_ro123}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        pool-name: HikariSlave
        minimum-idle: 5
        maximum-pool-size: 20
        connection-timeout: 30000
        idle-timeout: 600000

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redis123}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: seckill-order-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: com.seckill.*
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.seckill.model.dto.SeckillOrderMessage
    listener:
      ack-mode: manual_immediate

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.seckill.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:seckill-jwt-secret-key-2024-very-long-string-12345678901234567890}
  expiration: 86400000  # 24小时

app:
  instance-id: ${INSTANCE_ID:local}

logging:
  level:
    com.seckill: DEBUG
    org.mybatis: DEBUG
  pattern:
    console: "%d{HH:mm:ss} [${INSTANCE_ID:local}] [%thread] %-5level %logger{36} - %msg%n"
