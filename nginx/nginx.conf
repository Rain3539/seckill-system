user  nginx;
worker_processes  auto;           # 自动匹配 CPU 核数

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;     # 每个 worker 最大并发连接数
    use epoll;                    # Linux 高性能 IO 模型
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 日志格式（含upstream地址，方便确认请求打到哪个后端）──
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'upstream=$upstream_addr '          # 关键：记录转发目标
                      'rt=$request_time '                 # 请求总时间
                      'uct=$upstream_connect_time '       # 上游连接时间
                      'urt=$upstream_response_time';      # 上游响应时间

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── 引入站点配置 ─────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
