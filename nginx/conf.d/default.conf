# ============================================================
# 库存服务集群（负载均衡）
# ============================================================
upstream stock_cluster {
    server stock-service-1:8081;
    server stock-service-2:8081;
    # least_conn;
}

# ============================================================
# 订单服务集群（负载均衡）
# ============================================================
upstream order_cluster {
    server order-service-1:8082;
    server order-service-2:8082;
    # least_conn;
}

# ============================================================
# 动静分离缓存配置
# 静态资源（JS/CSS/图片）直接由Nginx服务，并设置强缓存
# 动态请求（/api/*）代理到对应后端微服务，不缓存
# ============================================================
server {
    listen 80;
    server_name localhost;
    charset utf-8;
    # 访问日志（含upstream地址，便于JMeter压测后分析）
    access_log /var/log/nginx/access.log main;

    # ── 前端入口（HTML，不缓存，保证版本最新）────────────
    location = / {
        root  /usr/share/nginx/html;
        index index.html;
        # HTML 不缓存，防止版本更新后用户拿到旧页面
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
    }

    location / {
        root  /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        # HTML 不缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── 静态资源（动静分离核心：强缓存30天）──────────────
    # Vite 打包的 JS/CSS 文件名含 hash，内容变化则文件名变化
    # 因此可以安全设置超长缓存
    location ~* \.(js|css)$ {
        root  /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type "static";   # 标记静态资源
        access_log off;   # 静态文件不记录日志，减少IO
    }

    # ── 动静分离：商品图片（精确前缀匹配，优先级高于正则）──
    location ^~ /static/images/ {
        alias /usr/share/nginx/static/images/;
        expires 90d;
        add_header Cache-Control "public, max-age=7776000, immutable";
        add_header X-Static-Type "product-image";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|webp|woff|woff2|ttf|eot)$ {
        root  /usr/share/nginx/html;
        expires 90d;
        add_header Cache-Control "public, max-age=7776000, immutable";
        add_header X-Content-Type "static-media";
        access_log off;
    }

    # ── 库存服务 API（秒杀、商品、库存）──────────────────
    location ~ ^/api/(seckill|product|stock)/ {
        proxy_pass         http://stock_cluster;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # 动态接口禁止缓存
        add_header Cache-Control "no-store";
        add_header X-Content-Type "dynamic";

        proxy_connect_timeout  5s;
        proxy_read_timeout     60s;
        proxy_next_upstream    error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ── 订单服务 API（订单、用户）────────────────────────
    location ~ ^/api/(order|user)/ {
        proxy_pass         http://order_cluster;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # 动态接口禁止缓存
        add_header Cache-Control "no-store";
        add_header X-Content-Type "dynamic";

        proxy_connect_timeout  5s;
        proxy_read_timeout     60s;
        proxy_next_upstream    error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ── 健康检查 ─────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
